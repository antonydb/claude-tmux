# --- Claude Code integration ---

# Bell notifications (triggered by Claude hooks on Stop/Notification)
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off

# Auto-name windows by running command (nvim, claude, zsh, etc.)
# Manual rename via <prefix>, disables auto-rename for that window
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}:#{pane_current_command}'
set -g allow-rename off

# Show bell indicator on windows that need attention
set -g window-status-bell-style 'fg=yellow,bold'
set -g window-status-format         '#I:#W#{?window_bell_flag, !,}'
set -g window-status-current-format '#I:#W'

# Status bar: show count of windows needing attention
set -g status-right '#(~/.local/bin/tmux-claude-status.sh) %H:%M'
set -g status-interval 5
